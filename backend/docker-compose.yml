version: "3.9"

services:
  # ── FastAPI Backend ──
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: roadguard-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://roadguard:roadguard@postgres:5432/roadguard
      - SYNC_DATABASE_URL=postgresql://roadguard:roadguard@postgres:5432/roadguard
      - REDIS_URL=redis://redis:6379/0
      - S3_ENDPOINT_URL=http://minio:9000
    depends_on:
      - postgres
      - redis
      - minio
    restart: unless-stopped

  # ── PostgreSQL + PostGIS ──
  postgres:
    image: postgis/postgis:16-3.4
    container_name: roadguard-postgres
    environment:
      POSTGRES_USER: roadguard
      POSTGRES_PASSWORD: roadguard
      POSTGRES_DB: roadguard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: roadguard-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # ── MinIO (S3-compatible object storage) ──
  minio:
    image: minio/minio:latest
    container_name: roadguard-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    restart: unless-stopped

  # ── Celery Worker ──
  celery-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: roadguard-celery
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://roadguard:roadguard@postgres:5432/roadguard
      - REDIS_URL=redis://redis:6379/0
      - S3_ENDPOINT_URL=http://minio:9000
    depends_on:
      - postgres
      - redis
      - minio
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
